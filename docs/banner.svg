<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/><stop offset="100%" style="stop-color:#110d1a"/>
    </linearGradient>
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e8272c"/><stop offset="50%" style="stop-color:#ff4d4d"/><stop offset="100%" style="stop-color:#c41e22"/>
    </linearGradient>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8272c"/><stop offset="100%" style="stop-color:#ff4d4d"/>
    </linearGradient>
    <linearGradient id="sf" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#e8272c;stop-opacity:0.08"/><stop offset="100%" style="stop-color:#e8272c;stop-opacity:0.01"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#e8272c;stop-opacity:0.07"/><stop offset="100%" style="stop-color:#e8272c;stop-opacity:0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="0.5" fill="#e8272c" opacity="0.03"/>
    </pattern>
    <filter id="gl"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="clip"><rect width="900" height="260" rx="14"/></clipPath>
  </defs>
  <rect width="900" height="260" rx="14" fill="url(#bg)"/>
  <rect width="900" height="260" rx="14" fill="url(#dots)"/>
  <rect width="900" height="3" rx="1.5" fill="url(#topBar)" clip-path="url(#clip)"/>
  <ellipse cx="100" cy="130" rx="120" ry="110" fill="url(#glow)"/>

  <!-- Shield with Falcon bird -->
  <g transform="translate(38, 35)" filter="url(#gl)">
    <path d="M60 10 L108 30 L108 90 C108 126 86 148 60 158 C34 148 12 126 12 90 L12 30 Z" fill="url(#sf)" stroke="url(#sg)" stroke-width="2.2"/>
    <path d="M40 55 C45 40 55 35 65 38 C72 40 78 48 80 55 C82 62 78 70 72 75 L65 82 L58 75 C55 72 52 68 50 64 C48 60 42 58 40 55 Z" fill="#e8272c" opacity="0.4"/>
    <circle cx="68" cy="48" r="2" fill="#ff4d4d" opacity="0.7"/>
    <line x1="30" y1="95" x2="90" y2="95" stroke="#e8272c" stroke-width="0.6" opacity="0.3"/>
    <line x1="35" y1="105" x2="85" y2="105" stroke="#ff4d4d" stroke-width="0.6" opacity="0.2"/>
    <path d="M46 118 L54 126 L74 106" fill="none" stroke="#ff4d4d" stroke-width="2.8" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Text -->
  <text x="220" y="55" font-family="monospace" font-size="10.5" fill="#e8272c" letter-spacing="5" opacity="0.6">CROWDSTRIKE FALCON</text>
  <text x="220" y="98" font-family="'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#f1f5f9">Deployment Validation</text>
  <text x="220" y="130" font-family="monospace" font-size="20" fill="#e8272c" font-weight="700" letter-spacing="1.5">Scanner</text>
  <line x1="220" y1="145" x2="520" y2="145" stroke="#1e293b" stroke-width="1"/>

  <!-- Module labels -->
  <g transform="translate(220, 158)">
    <text x="0" y="10" font-family="monospace" font-size="10" fill="#94a3b8">Prevention</text>
    <circle cx="72" cy="7" r="1.2" fill="#334155"/>
    <text x="80" y="10" font-family="monospace" font-size="10" fill="#94a3b8">Exclusions</text>
    <circle cx="150" cy="7" r="1.2" fill="#334155"/>
    <text x="158" y="10" font-family="monospace" font-size="10" fill="#94a3b8">Sensors</text>
    <circle cx="210" cy="7" r="1.2" fill="#334155"/>
    <text x="218" y="10" font-family="monospace" font-size="10" fill="#94a3b8">Admin</text>
    <circle cx="256" cy="7" r="1.2" fill="#334155"/>
    <text x="264" y="10" font-family="monospace" font-size="10" fill="#94a3b8">MITRE</text>
  </g>

  <!-- Badges -->
  <g transform="translate(220, 185)">
    <rect x="0" y="0" width="102" height="24" rx="5" fill="rgba(232,39,44,0.06)" stroke="#e8272c" stroke-width="0.7"/>
    <text x="51" y="16" font-family="monospace" font-size="9" fill="#e8272c" text-anchor="middle">EDR Hardening</text>
    <rect x="110" y="0" width="115" height="24" rx="5" fill="rgba(255,77,77,0.06)" stroke="#ff4d4d" stroke-width="0.7"/>
    <text x="167" y="16" font-family="monospace" font-size="9" fill="#ff4d4d" text-anchor="middle">MITRE ATT&amp;CK</text>
    <rect x="233" y="0" width="115" height="24" rx="5" fill="rgba(196,30,34,0.06)" stroke="#c41e22" stroke-width="0.7"/>
    <text x="290" y="16" font-family="monospace" font-size="9" fill="#c41e22" text-anchor="middle">Policy Validation</text>
  </g>

  <!-- Stats -->
  <g transform="translate(770,48)"><rect width="84" height="32" rx="16" fill="rgba(232,39,44,0.07)" stroke="#e8272c" stroke-width="0.9"/><text x="42" y="21" font-family="monospace" font-size="15" fill="#e8272c" text-anchor="middle" font-weight="700">v1.0</text></g>
  <g transform="translate(740,100)"><rect width="125" height="32" rx="6" fill="rgba(15,23,42,0.6)" stroke="#1e293b" stroke-width="0.6"/><text x="14" y="22" font-family="monospace" font-size="20" fill="#e8272c" font-weight="700">10</text><text x="42" y="22" font-family="sans-serif" font-size="11" fill="#64748b">modules</text></g>
  <g transform="translate(740,140)"><rect width="125" height="32" rx="6" fill="rgba(15,23,42,0.6)" stroke="#1e293b" stroke-width="0.6"/><text x="14" y="22" font-family="monospace" font-size="20" fill="#ff4d4d" font-weight="700">36+</text><text x="58" y="22" font-family="sans-serif" font-size="11" fill="#64748b">checks</text></g>
  <g transform="translate(740,180)"><rect width="125" height="32" rx="6" fill="rgba(15,23,42,0.6)" stroke="#1e293b" stroke-width="0.6"/><text x="14" y="22" font-family="monospace" font-size="16" fill="#c41e22" font-weight="700">0</text><text x="30" y="22" font-family="sans-serif" font-size="11" fill="#64748b">dependencies</text></g>

  <rect y="256" width="900" height="4" rx="2" fill="url(#topBar)" clip-path="url(#clip)" opacity="0.3"/>
</svg>
